version: '3.8'

services:
  robot-live-view:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robot-live-view-app
    ports:
      - '8080:80'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
